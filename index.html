<!DOCTYPE html>
<html>
<head>
    <title>НАЕБАЛОВО 100% | 10грн = 100♂</title>
    <style>
        body{
            font-family: 'Courier New', monospace;
            background-color: #000;
            color: #0f0;
            text-align: center;
            margin: 0;
            padding: 10px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .terminal {
            border: 2px solid #0f0;
            width: 90%;
            max-width: 800px;
            margin: 0 auto;
            padding: 30px;
            position: relative;
        }
        .display {
            font-size: 5vw;
            min-height: 20vh;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 3px;
            color: #f00;
            text-shadow: 0 0 15px #f00;
            margin: 20px 0;
            padding: 20px;
            border: 1px dashed #0f0;
        }
        .balance-panel {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }
        .balance {
            font-size: 2.5vw;
            color: #0f0;
            padding: 10px;
        }
        button {
            background: #000;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 15px 30px;
            font-family: 'Courier New', monospace;
            font-size: 1.8vw;
            margin: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #0f0;
            color: #000;
        }
        .blink {
            animation: blink 0.7s infinite;
        }
        .payment-btn {
            background: #0f0;
            color: #000;
            font-weight: bold;
        }
        
        /* Модальное окно платежа */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #000;
            border: 2px solid #0f0;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }
        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #f00;
            font-size: 30px;
            cursor: pointer;
        }
        .crypto-option {
            margin: 15px 0;
            padding: 10px;
            border: 1px solid #0f0;
            cursor: pointer;
        }
        .crypto-option:hover {
            background: #0f0;
            color: #000;
        }
        .crypto-option.active {
            background: #0f0;
            color: #000;
        }
        .qr-code {
            background: white;
            padding: 10px;
            margin: 20px auto;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .crypto-address {
            word-break: break-all;
            margin: 20px 0;
            padding: 10px;
            background: #111;
            border: 1px dashed #0f0;
        }
        
        @keyframes blink {
            50% { opacity: 0; }
        }
        @media (max-width: 768px) {
            .display { font-size: 10vw; }
            .balance { font-size: 5vw; }
            button { font-size: 4vw; padding: 12px 24px; }
            .qr-code {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
